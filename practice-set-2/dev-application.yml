apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dev-app
  namespace: argocd
spec:
  project: my-app-project
  source:
    repoURL: https://github.com/AravindS301/argocd-demo-practice.git
    targetRevision: HEAD
    path : manifest

  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  syncPolicy:
    automated: {}
