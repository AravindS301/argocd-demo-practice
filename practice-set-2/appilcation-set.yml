   apiVersion: argoproj.io/v1alpha1  
   kind: ApplicationSet  
   metadata:  
     name: env-appset
     namespace: argocd  
   spec:  
     generators:  
       - list:  
           elements:  
             - cluster: staging  
               repoURL: https://github.com/AravindS301/argocd-demo-practice.git  
             - cluster: production  
               repoURL: https://github.com/AravindS301/argocd-demo-practice.git  
     template:  
       metadata:  
         name: '{{cluster}}-app'  
       spec:  
         project: my-app-project 
         source:  
           repoURL: '{{repoURL}}'  
           path: manifest  
         destination:  
           server: https://kubernetes.default.svc  
           namespace: '{{cluster}}'

