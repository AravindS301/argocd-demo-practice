apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: canary-roll
spec:
  replicas: 2
  strategy:
    canary:
      steps:
        - setWeight: 20
        - pause: {duration: 30s}
        - setWeight: 50
        - pause: {duration: 60s}
      maxSurge: 1
      maxUnavailable: 1
  selector:
    matchLabels:
      app: my-app
  template:
    metadata:
      labels:
        app: my-app
    spec:
      containers:
      - name: canary-container
        image: argoproj/rollouts-demo:green
        ports:
        - containerPort: 8080
