apiVersion: apps/v1
kind: Deployment
metadata:
  name: app3
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: app3
  template:
    metadata:
      labels:
        app: app3
    spec:
      containers:
        - name: app3
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports:
            - containerPort: 80
