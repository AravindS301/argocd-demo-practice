apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: nginx-canary
spec:
  replicas: 2
  strategy:
    blueGreen:    #bluegreen strategy
      activeService: blue-svc #Live traffic service
      previewService: green-svc #testing service
      autoPromotionEnabled: false #wait before switching
  selector:
    matchLabels:
      app: nginx-canary
  template:
    metadata:
      labels:
        app: nginx-canary
    spec:
      containers:
        - name: nginx
          image: nginx:1.25
          ports:
            - containerPort: 80
