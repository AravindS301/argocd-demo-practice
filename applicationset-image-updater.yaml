apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: test-applications
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - appName: app1
            imageRepo: nginx
            imageTag: "1.25"
            path: test-chart
          - appName: app2
            imageRepo: nginx
            imageTag: "1.25"
            path: test1-chart
          - appName: app3
            imageRepo: nginx
            imageTag: "1.25"
            path: test2-chart
  template:
    metadata:
      name: "{{appName}}"
      annotations:
        argocd-image-updater.argoproj.io/image-list: "{{appName}}-image={{imageRepo}}:~{{imageTag}}"
        argocd-image-updater.argoproj.io/{{appName}}-image.update-strategy: latest
        argocd-image-updater.argoproj.io/write-back-method: git:secret:argocd/git-creds
        argocd-image-updater.argoproj.io/git-branch: main
    spec:
      project: default
      source:
        repoURL: "https://github.com/AravindS301/argocd-demo-practice.git"
        targetRevision: main
        path: "{{path}}"
        helm:
          parameters:
            - name: image.repository
              value: "{{imageRepo}}"
            - name: image.tag
              value: "{{imageTag}}"
            - name: replicaCount
              value: "1"
      destination:
        server: https://kubernetes.default.svc
        namespace: dev
      syncPolicy:
        syncOptions:
          - CreateNamespace=true
        automated:
          prune: true
          selfHeal: true
